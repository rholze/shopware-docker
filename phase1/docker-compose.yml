version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopware
      MYSQL_USER: shopware
      MYSQL_PASSWORD: shopware
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app

  php:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      APP_URL: ${SERVICE_FQDN_NGINX:-https://shopware.myhobby-ki.de}
      PHP_MEMORY_LIMIT: 512M
      FORCE_INSTALL: ${FORCE_INSTALL:-0}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
    networks:
      - app

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    depends_on:
      - php
    networks:
      - app

volumes:
  db_data:
  shopware_data:

networks:
  app:
    driver: bridge