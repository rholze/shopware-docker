version: '3.8'

networks:
  app:
    driver: bridge

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    networks:
      - app
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopware
      MYSQL_USER: shopware
      MYSQL_PASSWORD: shopware
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - app

  php:
    build: .
    restart: unless-stopped
    expose:
      - "9000"
    networks:
      - app
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      APP_URL: "https://shopware.myhobby-ki.de"
      DATABASE_URL: "mysql://shopware:shopware@db:3306/shopware"
      REDIS_URL: "redis://redis:6379"
      PHP_MEMORY_LIMIT: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    networks:
      - app
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: "mysql://shopware:shopware@db:3306/shopware"
      REDIS_URL: "redis://redis:6379"
      PHP_MEMORY_LIMIT: 512M
    command:
      - sh
      - -c
      - sleep 30 && php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      php:
        condition: service_healthy

volumes:
  db_data:
  shopware_data: