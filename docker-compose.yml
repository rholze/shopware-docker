version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopware
      MYSQL_USER: shopware
      MYSQL_PASSWORD: shopware
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped

  php:
    build: .
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: "mysql://shopware:shopware@db:3306/shopware"
      REDIS_URL: "redis://redis:6379"
      PHP_MEMORY_LIMIT: 512M
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: "mysql://shopware:shopware@db:3306/shopware"
      REDIS_URL: "redis://redis:6379"
      PHP_MEMORY_LIMIT: 512M
    command:
      - sh
      - -c
      - sleep 30 && php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    depends_on:
      php:
        condition: service_started

volumes:
  db_data:
  shopware_data:
