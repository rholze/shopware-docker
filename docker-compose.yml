version: '3.8'

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopware
      MYSQL_USER: shopware
      MYSQL_PASSWORD: shopware
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped

  php:
    build: .
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: "mysql://shopware:shopware@db:3306/shopware"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - db
      - redis

  worker:
    build: .
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
    command: >
      sh -c "sleep 30 &&
             php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M"
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - shopware_data:/var/www/html
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - php

volumes:
  db_data:
  shopware_data:
